<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ZiroTube V2</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
</head>
<body class="playback-page">
    <main class="player-container" id="playerContainer">
        <video id="videoPlayer" class="video-js vjs-big-play-centered vjs-default-skin" controls playsinline>
            <p class="vjs-no-js">Please enable JavaScript to view this video.</p>
        </video>
        <div class="video-error" id="videoError" style="display:none;">
            <div class="error-icon">✕</div>
            <p>Couldn't load this video.</p>
            <button class="back-button-secondary" id="errorBackButton">&#8592; Back to Dashboard</button>
        </div>
    </main>
    <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
